<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA Watch Party Bingo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap');

  :root {
    --pitch: #1a6b3a;
    --pitch-light: #218a49;
    --gold: #f5c518;
    --white: #f8f8f2;
    --dark: #0d1117;
    --card-bg: #111820;
    --stripe: rgba(255,255,255,0.03);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--white);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    background-image: repeating-linear-gradient(
      0deg, transparent, transparent 40px, var(--stripe) 40px, var(--stripe) 41px
    ), repeating-linear-gradient(
      90deg, transparent, transparent 40px, var(--stripe) 40px, var(--stripe) 41px
    );
  }

  header {
    background: var(--pitch);
    padding: 18px 20px 14px;
    text-align: center;
    border-bottom: 4px solid var(--gold);
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 300%;
    height: 100%;
    background: repeating-linear-gradient(
      90deg, transparent 0, transparent 60px, rgba(255,255,255,0.04) 60px, rgba(255,255,255,0.04) 62px
    );
  }

  .header-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--gold);
    opacity: 0.85;
    margin-bottom: 4px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(32px, 8vw, 56px);
    letter-spacing: 3px;
    line-height: 1;
    color: #fff;
  }

  h1 span { color: var(--gold); }

  .match-tabs {
    display: flex;
    gap: 0;
    padding: 16px 16px 0;
    max-width: 820px;
    margin: 0 auto;
  }

  .tab {
    flex: 1;
    padding: 10px 12px;
    background: #1a2030;
    border: 1px solid #2a3344;
    border-bottom: none;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    border-radius: 8px 8px 0 0;
  }

  .tab:first-child { margin-right: 4px; }

  .tab.active {
    background: var(--card-bg);
    border-color: var(--gold);
    border-bottom: 1px solid var(--card-bg);
  }

  .tab-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
    letter-spacing: 1.5px;
    display: block;
  }

  .tab-time {
    font-size: 10px;
    color: #6b7894;
    letter-spacing: 1px;
  }

  .tab.active .tab-time { color: var(--gold); }

  .tab-flags { font-size: 18px; margin-bottom: 2px; }

  .match-panel {
    display: none;
    max-width: 820px;
    margin: 0 auto;
    padding: 0 16px 24px;
    background: var(--card-bg);
    border: 1px solid #2a3344;
    border-top: none;
    border-radius: 0 0 12px 12px;
  }

  .match-panel.active { display: block; }

  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 0 12px;
    border-bottom: 1px solid #1e2a3a;
    margin-bottom: 14px;
  }

  .progress-info {
    font-size: 12px;
    color: #6b7894;
  }

  .progress-info strong {
    color: var(--gold);
    font-size: 15px;
  }

  .btn-reset {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid #2a3344;
    color: #6b7894;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-reset:hover { border-color: #e55; color: #e55; }

  .bingo-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }

  .bingo-cell {
    aspect-ratio: 1;
    background: #161e2c;
    border: 1px solid #1e2a3a;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: clamp(9px, 1.8vw, 12px);
    font-weight: 600;
    line-height: 1.25;
    padding: 6px 4px;
    cursor: pointer;
    transition: all 0.18s ease;
    user-select: none;
    color: #c8d0e0;
    position: relative;
    overflow: hidden;
  }

  .bingo-cell:hover {
    border-color: var(--gold);
    color: #fff;
    transform: scale(1.03);
  }

  .bingo-cell.marked {
    background: var(--pitch);
    border-color: var(--pitch-light);
    color: #fff;
  }

  .bingo-cell.marked::after {
    content: '✓';
    position: absolute;
    top: 4px; right: 6px;
    font-size: 10px;
    color: var(--gold);
    font-weight: 700;
  }

  .bingo-cell.free {
    background: var(--gold);
    color: var(--dark);
    border-color: var(--gold);
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(11px, 2.5vw, 16px);
    letter-spacing: 1px;
    cursor: default;
  }

  .bingo-cell.bingo-line {
    background: #2a5c3a;
    border-color: var(--gold);
    animation: pulse 0.4s ease;
  }

  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.06); }
    100% { transform: scale(1); }
  }

  .bingo-alert {
    display: none;
    text-align: center;
    padding: 14px;
    margin: 14px 0 0;
    background: linear-gradient(135deg, var(--pitch), #0d3d22);
    border: 2px solid var(--gold);
    border-radius: 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    color: var(--gold);
    animation: fadeIn 0.4s ease;
  }

  .bingo-alert.show { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  footer {
    text-align: center;
    padding: 20px;
    font-size: 11px;
    color: #3a4a5a;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<header>
  <div class="header-label">⚽ WATCH PARTY</div>
  <h1>FIFA <span>BINGO</span></h1>
</header>

<div class="match-tabs">
  <div class="tab active" onclick="switchTab(0)">
    <div class="tab-flags">🇶🇦 🇨🇭</div>
    <span class="tab-title">Qatar vs Switzerland</span>
    <span class="tab-time">🕚 11:00 PM</span>
  </div>
  <div class="tab" onclick="switchTab(1)">
    <div class="tab-flags">🇧🇷 🇲🇦</div>
    <span class="tab-title">Brazil vs Morocco</span>
    <span class="tab-time">🕑 2:00 AM</span>
  </div>
</div>

<div id="panel-0" class="match-panel active">
  <div class="panel-header">
    <div class="progress-info">Marked: <strong id="count-0">0</strong> / 24</div>
    <button class="btn-reset" onclick="resetBoard(0)">Reset</button>
  </div>
  <div class="bingo-grid" id="grid-0"></div>
  <div class="bingo-alert" id="alert-0">🏆 BINGO! 🏆</div>
</div>

<div id="panel-1" class="match-panel">
  <div class="panel-header">
    <div class="progress-info">Marked: <strong id="count-1">0</strong> / 24</div>
    <button class="btn-reset" onclick="resetBoard(1)">Reset</button>
  </div>
  <div class="bingo-grid" id="grid-1"></div>
  <div class="bingo-alert" id="alert-1">🏆 BINGO! 🏆</div>
</div>

<footer>TAP A SQUARE WHEN IT HAPPENS · FREE SPACE AUTO-MARKED · GET 5 IN A ROW TO WIN</footer>

<script>
const items = [
  // Qatar vs Switzerland — match 0
  [
    "VAR Review",
    "Yellow Card",
    "Corner Kick in first 5 mins",
    "Goalkeeper saves a penalty",
    "Goal disallowed by VAR",
    "Swiss counter-attack",
    "Qatar keeper rushing off his line",
    "Player down holding their face",
    "Offside trap springs",
    "Header on target",
    "Substitution before 60 mins",
    "Red Card",
    // FREE goes in middle (index 12 replaced)
    "Keeper punts long",
    "Crowd doing the wave",
    "Commentator mispronounces a name",
    "Set piece scored directly",
    "Two yellows = Red",
    "Shot hits the post",
    "Injury time of 5+ mins",
    "Qatar goal from a set piece",
    "Swiss player booked for diving",
    "Manager gesturing wildly on sideline",
    "Own goal",
    "Player drinks water mid-play stoppage",
  ],
  // Brazil vs Morocco — match 1
  [
    "Neymar-style skill move",
    "Brazil fans going wild in stands",
    "Morocco defending deep",
    "VAR Review",
    "Yellow Card",
    "Brazilian samba celebration",
    "Morocco on the counter",
    "Brazil free kick curler",
    "Player takes off shirt celebrating",
    "Goalkeeper massive save",
    "Brazil score first",
    "Morocco header from corner",
    // FREE in middle
    "Shot hits the crossbar",
    "Brazil nutmeg",
    "Two yellows = Red",
    "Morocco goal from set piece",
    "Commentator says 'beautiful football'",
    "Brazil substitution before 70 mins",
    "Morocco keeper makes 3+ saves",
    "Red Card",
    "Injury time of 6+ mins",
    "Brazil player injured but plays on",
    "Own goal",
    "Brazil win by 2+ goals 🎉",
  ]
];

const state = [
  new Array(25).fill(false),
  new Array(25).fill(false),
];

// Mark center (index 12) as FREE for both
state[0][12] = true;
state[1][12] = true;

function buildGrid(matchIdx) {
  const grid = document.getElementById(`grid-${matchIdx}`);
  grid.innerHTML = '';
  const squares = items[matchIdx].slice();

  for (let i = 0; i < 25; i++) {
    const cell = document.createElement('div');
    cell.className = 'bingo-cell';
    cell.dataset.idx = i;

    if (i === 12) {
      cell.classList.add('free', 'marked');
      cell.textContent = '⭐ FREE';
    } else {
      const itemIdx = i < 12 ? i : i - 1;
      cell.textContent = squares[itemIdx];
      if (state[matchIdx][i]) {
        cell.classList.add('marked');
      }
      cell.onclick = () => toggleCell(matchIdx, i, cell);
    }

    grid.appendChild(cell);
  }
  updateCount(matchIdx);
  checkBingo(matchIdx);
}

function toggleCell(matchIdx, idx, cell) {
  state[matchIdx][idx] = !state[matchIdx][idx];
  cell.classList.toggle('marked', state[matchIdx][idx]);
  updateCount(matchIdx);
  checkBingo(matchIdx);
}

function updateCount(matchIdx) {
  const total = state[matchIdx].filter((v, i) => v && i !== 12).length;
  document.getElementById(`count-${matchIdx}`).textContent = total;
}

function getLines() {
  const lines = [];
  // Rows
  for (let r = 0; r < 5; r++) lines.push([r*5, r*5+1, r*5+2, r*5+3, r*5+4]);
  // Cols
  for (let c = 0; c < 5; c++) lines.push([c, c+5, c+10, c+15, c+20]);
  // Diagonals
  lines.push([0,6,12,18,24]);
  lines.push([4,8,12,16,20]);
  return lines;
}

function checkBingo(matchIdx) {
  const s = state[matchIdx];
  const grid = document.getElementById(`grid-${matchIdx}`);
  const cells = grid.querySelectorAll('.bingo-cell');
  const alert = document.getElementById(`alert-${matchIdx}`);

  // Clear bingo highlights
  cells.forEach(c => c.classList.remove('bingo-line'));

  let hasBingo = false;
  getLines().forEach(line => {
    if (line.every(i => s[i])) {
      hasBingo = true;
      line.forEach(i => cells[i].classList.add('bingo-line'));
    }
  });

  alert.classList.toggle('show', hasBingo);
}

function resetBoard(matchIdx) {
  state[matchIdx].fill(false);
  state[matchIdx][12] = true;
  buildGrid(matchIdx);
  document.getElementById(`alert-${matchIdx}`).classList.remove('show');
}

function switchTab(idx) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  document.querySelectorAll('.match-panel').forEach((p, i) => p.classList.toggle('active', i === idx));
}

// Init
buildGrid(0);
buildGrid(1);
</script>
</body>
</html>
